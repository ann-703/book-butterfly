<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FFD45E" />
  <title>Book Butterfly 🦋</title>
  <!-- Fonts load async; system-font fallback paints instantly so the app never blocks on the network -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" /></noscript>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       FLOATING SPARKLE SKY (pure CSS, fixed behind app)
  ═══════════════════════════════════════════════ -->
  <div class="sky" aria-hidden="true">
    <span class="twinkle t1">✦</span>
    <span class="twinkle t2">✺</span>
    <span class="twinkle t3">✦</span>
    <span class="twinkle t4">❀</span>
    <span class="twinkle t5">✦</span>
    <span class="twinkle t6">✺</span>
    <span class="twinkle t7">❀</span>
  </div>

  <!-- ═══════════════════════════════════════════════
       BUTTERFLY MASCOT — defined ONCE, reused via <use>
       (drawn from Priana's Canva design)
  ═══════════════════════════════════════════════ -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
    <style>
      /* Gentle wing-flap — defined inside the SVG so every <use> clone inherits it */
      .bf-wings { transform-box: fill-box; transform-origin: center; animation: wingflap 2.4s ease-in-out infinite; }
      @keyframes wingflap { 0%,100% { transform: scaleX(1); } 50% { transform: scaleX(0.94); } }
      @media (prefers-reduced-motion: reduce) { .bf-wings { animation: none; } }
    </style>
    <defs>
      <linearGradient id="wingTop" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#FF63CE"/>
        <stop offset="1" stop-color="#F2009B"/>
      </linearGradient>
      <linearGradient id="wingBot" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#FF45BE"/>
        <stop offset="1" stop-color="#DD008C"/>
      </linearGradient>
      <linearGradient id="bodyG" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#C879EC"/>
        <stop offset="1" stop-color="#9B45C9"/>
      </linearGradient>
    </defs>

    <symbol id="bf" viewBox="0 0 200 260">
      <!-- ── WINGS ── -->
      <g class="bf-wings">
        <ellipse cx="56"  cy="98"  rx="54" ry="62" fill="url(#wingTop)" transform="rotate(-10 56 98)"/>
        <ellipse cx="144" cy="98"  rx="54" ry="62" fill="url(#wingTop)" transform="rotate(10 144 98)"/>
        <ellipse cx="60"  cy="172" rx="40" ry="48" fill="url(#wingBot)" transform="rotate(8 60 172)"/>
        <ellipse cx="140" cy="172" rx="40" ry="48" fill="url(#wingBot)" transform="rotate(-8 140 172)"/>
        <!-- soft white highlights -->
        <ellipse cx="40" cy="78"  rx="14" ry="9" fill="#fff" opacity="0.18" transform="rotate(-20 40 78)"/>
        <ellipse cx="160" cy="78" rx="14" ry="9" fill="#fff" opacity="0.18" transform="rotate(20 160 78)"/>
      </g>

      <!-- ── GOLD SPARKLE STARS ── -->
      <g fill="#FFC83D">
        <polygon points="50,85 53.7,92.3 61,96 53.7,99.7 50,107 46.3,99.7 39,96 46.3,92.3"/>
        <polygon points="150,85 153.7,92.3 161,96 153.7,99.7 150,107 146.3,99.7 139,96 146.3,92.3"/>
        <polygon points="58,164 60.7,169.3 66,172 60.7,174.7 58,180 55.3,174.7 50,172 55.3,169.3"/>
        <polygon points="142,164 144.7,169.3 150,172 144.7,174.7 142,180 139.3,174.7 134,172 139.3,169.3"/>
      </g>

      <!-- ── SCATTERED GOLD DOTS ── -->
      <g fill="#FFD45E">
        <circle cx="40" cy="80" r="2.2"/><circle cx="68" cy="84" r="1.8"/><circle cx="34" cy="104" r="2"/>
        <circle cx="70" cy="116" r="2.1"/><circle cx="46" cy="120" r="1.7"/>
        <circle cx="160" cy="80" r="2.2"/><circle cx="132" cy="84" r="1.8"/><circle cx="166" cy="104" r="2"/>
        <circle cx="130" cy="116" r="2.1"/><circle cx="154" cy="120" r="1.7"/>
        <circle cx="48" cy="160" r="1.8"/><circle cx="66" cy="186" r="2"/><circle cx="44" cy="180" r="1.6"/>
        <circle cx="152" cy="160" r="1.8"/><circle cx="134" cy="186" r="2"/><circle cx="156" cy="180" r="1.6"/>
      </g>

      <!-- ── GOLD DASHES ── -->
      <g stroke="#FFD45E" stroke-width="3" stroke-linecap="round">
        <line x1="30" y1="92" x2="35" y2="97"/><line x1="64" y1="104" x2="69" y2="109"/>
        <line x1="170" y1="92" x2="165" y2="97"/><line x1="136" y1="104" x2="131" y2="109"/>
        <line x1="52" y1="166" x2="57" y2="171"/><line x1="148" y1="166" x2="143" y2="171"/>
      </g>

      <!-- ── BODY ── -->
      <rect x="90" y="58" width="20" height="166" rx="10" fill="url(#bodyG)"/>

      <!-- black squiggle bands -->
      <g stroke="#2A1240" stroke-width="2.2" fill="none" stroke-linecap="round">
        <path d="M91,103 q4.5,-4 9,0 t9,0"/>
        <path d="M91,123 q4.5,-4 9,0 t9,0"/>
        <path d="M91,143 q4.5,-4 9,0 t9,0"/>
        <path d="M91,163 q4.5,-4 9,0 t9,0"/>
        <path d="M91,183 q4.5,-4 9,0 t9,0"/>
        <path d="M91,203 q4.5,-4 9,0 t9,0"/>
      </g>

      <!-- ── RAINBOW HEARTS down body ── -->
      <g class="bf-hearts">
        <path transform="translate(100 93)"  d="M0,-3 C0,-7 -6,-9 -8,-4 C-10,1 -3,6 0,9 C3,6 10,1 8,-4 C6,-9 0,-7 0,-3 Z" fill="#FF3B3B"/>
        <path transform="translate(100 113)" d="M0,-3 C0,-7 -6,-9 -8,-4 C-10,1 -3,6 0,9 C3,6 10,1 8,-4 C6,-9 0,-7 0,-3 Z" fill="#FF9F1C"/>
        <path transform="translate(100 133)" d="M0,-3 C0,-7 -6,-9 -8,-4 C-10,1 -3,6 0,9 C3,6 10,1 8,-4 C6,-9 0,-7 0,-3 Z" fill="#FFD60A"/>
        <path transform="translate(100 153)" d="M0,-3 C0,-7 -6,-9 -8,-4 C-10,1 -3,6 0,9 C3,6 10,1 8,-4 C6,-9 0,-7 0,-3 Z" fill="#34D058"/>
        <path transform="translate(100 173)" d="M0,-3 C0,-7 -6,-9 -8,-4 C-10,1 -3,6 0,9 C3,6 10,1 8,-4 C6,-9 0,-7 0,-3 Z" fill="#2D9CFF"/>
        <path transform="translate(100 193)" d="M0,-3 C0,-7 -6,-9 -8,-4 C-10,1 -3,6 0,9 C3,6 10,1 8,-4 C6,-9 0,-7 0,-3 Z" fill="#9B6BFF"/>
      </g>

      <!-- ── HEAD ── -->
      <circle cx="100" cy="62" r="16" fill="url(#bodyG)"/>

      <!-- ── ANTENNAE (groups so the glow overlay can sit on top) ── -->
      <g class="bf-antenna bf-antenna--red">
        <path d="M94,49 Q80,30 73,24" stroke="#FF2D2D" stroke-width="3" fill="none" stroke-linecap="round"/>
        <circle cx="72" cy="23" r="4.6" fill="#FF2D2D"/>
      </g>
      <g class="bf-antenna bf-antenna--green">
        <path d="M106,49 Q120,30 127,24" stroke="#00C24A" stroke-width="3" fill="none" stroke-linecap="round"/>
        <circle cx="128" cy="23" r="4.6" fill="#00C24A"/>
      </g>

      <!-- ── FACE ── -->
      <!-- cheeks -->
      <circle cx="89" cy="68" r="4" fill="#FF7FC4" opacity="0.55"/>
      <circle cx="111" cy="68" r="4" fill="#FF7FC4" opacity="0.55"/>
      <!-- glasses -->
      <g stroke="#2A1240" stroke-width="1.8" fill="none">
        <rect x="85" y="55" width="13" height="10" rx="4"/>
        <rect x="102" y="55" width="13" height="10" rx="4"/>
        <line x1="98" y1="60" x2="102" y2="60"/>
      </g>
      <!-- eyes -->
      <ellipse cx="91.5" cy="60" rx="3.3" ry="4" fill="#fff"/>
      <ellipse cx="108.5" cy="60" rx="3.3" ry="4" fill="#fff"/>
      <circle cx="92" cy="61" r="1.9" fill="#2A1240"/>
      <circle cx="109" cy="61" r="1.9" fill="#2A1240"/>
      <circle cx="92.8" cy="60.2" r="0.7" fill="#fff"/>
      <circle cx="109.8" cy="60.2" r="0.7" fill="#fff"/>
      <!-- lashes -->
      <path d="M86,53 q4,-2.5 8,0" stroke="#2A1240" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <path d="M106,53 q4,-2.5 8,0" stroke="#2A1240" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <!-- mouths (toggled by CSS custom properties through <use>) -->
      <path class="bf-mouth bf-mouth--happy" style="display:var(--bf-happy,inline)"
            d="M93,71 Q100,78 107,71" stroke="#2A1240" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <path class="bf-mouth bf-mouth--sad" style="display:var(--bf-sad,none)"
            d="M93,75 Q100,68 107,75" stroke="#2A1240" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    </symbol>
  </svg>


  <div class="app-container">

    <!-- ═══════════════════════════════════════
         SCREEN 1: Welcome
    ═══════════════════════════════════════ -->
    <div class="screen active" id="screen-1">

      <h1 class="screen-title">Book Butterfly</h1>

      <div class="welcome-layout">
        <div class="mascot-wrap mascot-flap">
          <svg class="bf" viewBox="0 0 200 260" role="img" aria-label="Book Butterfly mascot"><use href="#bf"/></svg>
        </div>
        <div class="speech-bubble speech-bubble-right">
          Hi! What book do we have today?
        </div>
      </div>

      <form id="book-form" novalidate class="book-form">
        <input type="file" id="book-image" accept="image/*" style="display:none" aria-label="Take a photo of the book" />
        <input type="file" id="book-image-upload" accept="image/*" style="display:none" aria-label="Upload a picture of the book" />

        <div class="photo-actions">
          <button type="button" class="btn btn-camera-big" id="camera-btn">
            📷 Take A Photo
          </button>
          <button type="button" class="btn-upload-link" id="upload-btn">
            or upload 🖼️
          </button>
        </div>

        <div class="image-preview-wrap" id="image-preview-wrap">
          <img id="image-preview" src="" alt="Your book cover" />
          <button type="button" class="remove-image-btn" id="remove-image-btn" aria-label="Remove image">✕</button>
        </div>

        <div class="divider">
          <span class="divider-line"></span>
          <span class="divider-text">or type it</span>
          <span class="divider-line"></span>
        </div>

        <div class="field-group">
          <label class="field-label" for="book-blurb">Tell me about the book! 📖</label>
          <textarea
            id="book-blurb"
            class="blurb-textarea"
            rows="4"
            placeholder="Paste or type what the back of the book says..."
            aria-label="Copy the back cover words here"
          ></textarea>
        </div>

        <button type="submit" class="btn btn-hotpink btn-submit" id="submit-btn" disabled>
          ✨ Check this Book! ✨
        </button>
      </form>

    </div><!-- /screen-1 -->


    <!-- ═══════════════════════════════════════
         SCREEN 2: Loading
    ═══════════════════════════════════════ -->
    <div class="screen" id="screen-2">
      <div class="loading-content">
        <div class="mascot-wrap mascot-bounce">
          <svg class="bf bf--sm" viewBox="0 0 200 260" aria-hidden="true"><use href="#bf"/></svg>
        </div>
        <div class="speech-bubble speech-bubble-center">
          Let me think... 🤔
        </div>
        <p class="loading-title">Book Butterfly is reading!</p>
        <div class="loading-dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div><!-- /screen-2 -->


    <!-- ═══════════════════════════════════════
         SCREEN 3: Result — GOOD BOOK
    ═══════════════════════════════════════ -->
    <div class="screen" id="screen-3">
      <h1 class="screen-title">Book Butterfly</h1>

      <div class="result-layout">
        <div class="mascot-wrap mascot-result mascot-pop">
          <div class="lightning-bolt" aria-hidden="true">⚡</div>
          <svg class="bf bf--md bf--good" viewBox="0 0 200 260" aria-hidden="true"><use href="#bf"/></svg>
          <span class="bf-glow bf-glow--green" aria-hidden="true"></span>
        </div>
        <div class="speech-bubble speech-bubble-right result-bubble result-bubble-good">
          This is a good book! 💚
        </div>
      </div>

      <div class="reason-box reason-box-good">
        <div id="result-reason-good" class="result-reason-text"></div>
      </div>

      <div class="result-actions">
        <button type="button" class="btn btn-hotpink btn-why" id="why-btn-good">
          WHY? 💛
        </button>
      </div>

      <div class="feedback-section-hidden" id="feedback-section-3">
        <textarea class="feedback-textarea-hidden" id="feedback-text" rows="1" aria-label="Write a message to your Mama" placeholder="Tell Mama what you think..."></textarea>
        <button type="button" class="btn-hidden" id="send-feedback-btn">Send to Mama</button>
        <div id="feedback-confirmation-3" hidden></div>
      </div>
    </div><!-- /screen-3 -->


    <!-- ═══════════════════════════════════════
         SCREEN 4: Result — NOT YET (Bad Book)
    ═══════════════════════════════════════ -->
    <div class="screen" id="screen-4">
      <h1 class="screen-title">Book Butterfly</h1>

      <div class="result-layout">
        <div class="mascot-wrap mascot-result mascot-pop">
          <svg class="bf bf--md bf--bad" viewBox="0 0 200 260" aria-hidden="true"><use href="#bf"/></svg>
          <span class="bf-glow bf-glow--red" aria-hidden="true"></span>
        </div>
        <div class="speech-bubble speech-bubble-right result-bubble result-bubble-bad">
          This one is not-yet. 🌸
        </div>
      </div>

      <div class="reason-box reason-box-bad">
        <div id="result-reason-notyet" class="result-reason-text"></div>
      </div>

      <div class="result-actions">
        <button type="button" class="btn btn-hotpink btn-why" id="why-btn-bad">
          WHY? 💛
        </button>
      </div>

      <div class="feedback-section-hidden" id="feedback-section-4">
        <textarea class="feedback-textarea-hidden" id="feedback-text-4" rows="1" aria-label="Write a message to your Mama" placeholder="Tell Mama what you think..."></textarea>
        <button type="button" class="btn-hidden" id="send-feedback-btn-4">Send to Mama</button>
        <div id="feedback-confirmation-4" hidden></div>
      </div>
    </div><!-- /screen-4 -->


    <!-- ═══════════════════════════════════════
         SCREEN 5: Celebration
    ═══════════════════════════════════════ -->
    <div class="screen" id="screen-5">
      <div class="celebration-wrap">
        <div class="mascot-wrap mascot-bounce">
          <svg class="bf bf--lg" viewBox="0 0 200 260" aria-hidden="true"><use href="#bf"/></svg>
        </div>
        <div class="speech-bubble speech-bubble-center">
          Message sent to Mama! 🦋💕
        </div>
        <button type="button" class="btn btn-hotpink btn-check-another" id="check-another-btn">
          Check another book?
        </button>
      </div>
    </div><!-- /screen-5 -->


    <!-- ═══════════════════════════════════════
         SCREEN 6: WHY explanation
    ═══════════════════════════════════════ -->
    <div class="screen" id="screen-6">
      <h1 class="screen-title why-title">WHY</h1>

      <div class="why-bubbles">
        <div class="why-bubble-wrap why-bubble-child">
          <span class="bubble-label">Priana</span>
          <div class="speech-bubble speech-bubble-why">
            <span id="why-child-question"></span>
          </div>
        </div>

        <div class="why-bubble-wrap why-bubble-bf">
          <span class="bubble-label">
            <svg class="bf-mini" viewBox="0 0 200 260" aria-hidden="true"><use href="#bf"/></svg>
            Book Butterfly
          </span>
          <div class="speech-bubble speech-bubble-why butterfly-bubble">
            <span id="why-butterfly-answer"></span>
          </div>
        </div>
      </div>

      <div class="why-actions">
        <button type="button" class="btn btn-teal" id="ask-mama-btn">
          Ask Mama 🦋
        </button>
      </div>
    </div><!-- /screen-6 -->


    <!-- ═══════════════════════════════════════
         SCREEN 7: Ask Mama (feedback / email)
    ═══════════════════════════════════════ -->
    <div class="screen" id="screen-7">
      <h1 class="screen-title">Ask Mama</h1>

      <div class="letter-wrap">
        <p class="letter-salutation">Dear Mama,</p>
        <textarea
          id="feedback-text-mama"
          class="letter-textarea"
          rows="6"
          aria-label="Write a message to Mama"
        ></textarea>
        <p class="letter-sign">Love, Priana. 💕</p>
      </div>

      <div class="mama-actions">
        <button type="button" class="btn btn-hotpink btn-send-mama" id="send-mama-btn">
          Send To Mama! 💌
        </button>
      </div>
    </div><!-- /screen-7 -->


  </div><!-- /app-container -->

  <!-- HEIC decoder (only used when an iPhone photo is chosen) -->
  <script src="https://unpkg.com/heic2any@0.0.4/dist/heic2any.js"></script>
  <!-- App config (API keys) -->
  <script src="config.js"></script>
  <!-- Main app logic -->
  <script src="app.js"></script>

</body>
</html>
